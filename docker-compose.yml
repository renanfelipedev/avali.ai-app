services:
  # PHP App Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        user: renan
        uid: 1000
    image: avaliai-app
    container_name: avaliai-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - avaliai-network

  # Nginx Service
  web:
    image: nginx:alpine
    container_name: avaliai-web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - avaliai-network
    depends_on:
      - app

  # Redis Service
  redis:
    image: redis:alpine
    container_name: avaliai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - avaliai-network

  # Queue Worker Service
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        user: renan
        uid: 1000
    image: avaliai-app
    container_name: avaliai-worker
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    command: php artisan queue:work --verbose --tries=3 --timeout=90
    networks:
      - avaliai-network
    depends_on:
      - app
      - redis

  # Optional MySQL Service (if you want to move away from SQLite)
  db:
    profiles: ["local"]
    image: mysql:8.0
    container_name: avaliai-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-avaliai}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-sail}
    ports:
      - "3306:3306"
    networks:
      - avaliai-network

  # Optional PostgreSQL Service
  postgres:
    profiles: ["local"]
    image: postgres:16-alpine
    container_name: avaliai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-avaliai}
      POSTGRES_USER: ${DB_USERNAME:-sail}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-root}
    ports:
      - "5432:5432"
    networks:
      - avaliai-network

networks:
  avaliai-network:
    driver: bridge
